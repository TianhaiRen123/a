<!DOCTYPE html>
<html>
<head>
    <title>案件受理费计算器</title>
    <style>
        .calculator {
            max-width: 400px;
            margin: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        input, button {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            margin-top: 15px;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h3>案件受理费计算器</h3>
        <input type="number" id="amount" placeholder="请输入争议金额" min="0" step="0.01">
        <button onclick="calculateInBrowser()">计算受理费</button>
        <div id="result"></div>
    </div>
    
    <script>
        function calculateCaseFee(amount) {
    if (typeof amount !== 'number' || amount < 0) {
        throw new Error('争议金额必须为非负数');
    }
    
    if (amount <= 5000) {
        return 100;
    } else if (amount <= 50000) {
        return amount * 0.04-100;
    } else if (amount <= 100000) {
        return amount * 0.03+400;
    } else if (amount <= 200000) {
        return amount * 0.02+1400;
    } else if (amount <= 500000) {
        return amount * 0.015+2400;
    } else if (amount <= 1000000) {
        return amount * 0.008+5900;
    } else {
        return amount * 0.004+9900;
    }
}

/**
 * 格式化金额显示，添加千分位分隔符
 * @param {number} num - 要格式化的数字
 * @returns {string} 格式化后的金额字符串
 */
function formatCurrency(num) {
    return num.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

// 使用示例
function displayCalculation(amount) {
    try {
        const fee = calculateCaseFee(amount);
        console.log(`争议金额: ¥${formatCurrency(amount)}`);
        console.log(`案件受理费: ¥${formatCurrency(fee)}`);
        console.log('---');
        return fee;
    } catch (error) {
        console.error('计算错误:', error.message);
        return null;
    }
}

// 测试不同金额的计算结果
const testAmounts = [3000, 15000, 75000, 150000, 350000, 750000, 1500000];

console.log('案件受理费计算器');
console.log('================');
testAmounts.forEach(amount => {
    displayCalculation(amount);
});

// 浏览器版本（如果在网页中使用）
function calculateInBrowser() {
    const amountInput = document.getElementById('amount');
    const resultDiv = document.getElementById('result');
    
    if (amountInput && resultDiv) {
        const amount = parseFloat(amountInput.value);
        
        if (isNaN(amount) || amount < 0) {
            resultDiv.innerHTML = '<span style="color: red;">请输入有效的争议金额</span>';
            return;
        }
        
        try {
            const fee = calculateCaseFee(amount);
            resultDiv.innerHTML = `
                <p><strong>争议金额:</strong> ¥${formatCurrency(amount)}</p>
                <p><strong>案件受理费:</strong> ¥${formatCurrency(fee)}</p>
            `;
        } catch (error) {
            resultDiv.innerHTML = `<span style="color: red;">${error.message}</span>`;
        }
    }
}
    </script>
</body>
</html>
