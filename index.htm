<script language=javascript >
function calculator1()
{
var result=0;
var biaodi = document.form1.biaodi.value;
	if(biaodi>0&&biaodi<=10000)
	{
	result=50;
	}
	if(biaodi>10000&&biaodi<=100000)
	{
	result=eval(biaodi*0.025-200);
	}
	if(biaodi>100000&&biaodi<=200000)
	{
	result=eval(biaodi*0.02+300);
	}
	if(biaodi>200000&&biaodi<=500000)
	{
	result=eval(biaodi*0.015+1300);
	}
	if(biaodi>500000&&biaodi<=1000000)
	{
	result=eval(biaodi*0.01+3800);
	}
	if(biaodi>1000000&&biaodi<=2000000)
	{
	result=eval(biaodi*0.009+4800);
	}
	if(biaodi>2000000&&biaodi<=5000000)
	{
	result=eval(biaodi*0.008+6800);
	}
	if(biaodi>5000000&&biaodi<=10000000)
	{
	result=eval(biaodi*0.007+11800);
	}
	if(biaodi>10000000&&biaodi<=20000000)
	{
	result=eval(biaodi*0.006+21800);
	}
	if(biaodi>20000000)
	{
	result=eval(biaodi*0.005+41800);
	}
	document.form1.result.value=(Math.round(result*100))/100;
	document.form1.result_ban.value=(Math.round(result*100/2))/100;

	if(result==0)
	{
	document.form1.result.value="请先正确填写好标的额!"
	document.form1.biaodi.value="";
	document.form1.biaodi.focus();
	}
}

function calculator2()
{
var result=0;
var biaodi = document.form2.biaodi.value;
	if(biaodi>0&&biaodi<=1000)
	{
	result=30;
	}
	if(biaodi>1000&&biaodi<=100000)
	{
	result=eval(biaodi*0.01+20);
	}
	if(biaodi>100000)
	{
	result=eval(biaodi*0.005+520);
	}
	if(result>5000)
	{
	result=5000;
	}
	document.form2.result.value=(Math.round(result*100))/100;
	if(result==0)
	{
	document.form2.result.value="请先正确填写好标的额!"
	document.form2.biaodi.value="";
	document.form2.biaodi.focus();
	}
}
</script>
