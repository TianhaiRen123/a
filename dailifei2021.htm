<script language=javascript >
function calculator()
{
var result=0;
var biaodi = document.form.biaodi.value;
	if(biaodi>0&&biaodi<=100000)
	{
	result=eval(biaodi*0.07);
	}
	if(result<5000)
	{
	result=5000;
	}
	if(biaodi>100000&&biaodi<=1000000)
	{
	result=eval(biaodi*0.06+1000);
	}
	if(biaodi>1000000&&biaodi<=5000000)
	{
	result=eval(biaodi*0.05+11000);
	}
	if(biaodi>5000000&&biaodi<=10000000)
	{
	result=eval(biaodi*0.03+111000);
	}
	if(biaodi>10000000&&biaodi<=50000000)
	{
	result=eval(biaodi*0.01+311000);
	}
	if(biaodi>50000000)
	{
	result=eval(biaodi*0.005+561000);
	}

	document.form.result.value=Math.round(result);

	if(result==0)
	{
	document.form.result.value="请先正确填写好标的额!"
	document.form.biaodi.value="";
	document.form.biaodi.focus();
	}
}

</script>
