<form name ="form">
<table align="center">
<tr><td>诉讼标的额：</td><td><input type =text name ="biaodi" value=""></td><td><input type =button value = "计算" onclick ="return calculator()"></td></tr>
<tr><td>代理费下限：</td><td><input type =text name ="result_x" value=""></td><td></td></tr>
<tr><td>代理费上限：</td><td><input type =text name ="result_s" value=""></td><td></td></tr>

</form>

<script language=javascript >
function calculator()
{
var result_x=0;
var biaodi = document.form.biaodi.value;
	if(biaodi>0&&biaodi<=10000)
	{
	result_x=2500;
	}
	if(biaodi>10000&&biaodi<=100000)
	{
	result_x=eval(biaodi*0.06+1900);
	}
	if(biaodi>100000&&biaodi<=500000)
	{
	result_x=eval(biaodi*0.05+2900);
	}
	if(biaodi>500000&&biaodi<=1000000)
	{
	result_x=eval(biaodi*0.04+7900);
	}
	if(biaodi>1000000&&biaodi<=5000000)
	{
	result_x=eval(biaodi*0.03+17900);
	}
	document.form.result_x.value=Math.round(result_x);

	if(result_x==0)
	{
	document.form.result_x.value="请先正确填写好标的额!"
	document.form.biaodi.value="";
	document.form.biaodi.focus();
	}
	if(biaodi>0&&biaodi<=10000)
	{
	result_s=3000;
	}
	if(biaodi>10000&&biaodi<=100000)
	{
	result_s=eval(biaodi*0.09+2100);
	}
	if(biaodi>100000&&biaodi<=500000)
	{
	result_s=eval(biaodi*0.06+5100);
	}
	if(biaodi>500000&&biaodi<=1000000)
	{
	result_s=eval(biaodi*0.05+10100);
	}
	if(biaodi>1000000&&biaodi<=5000000)
	{
	result_s=eval(biaodi*0.04+21100);
	}
	document.form.result_s.value=Math.round(result_s);
	
}

</script>
